<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Contexto">
<meta name="description" content="La realidad que los medios no te explican. Todos los días.">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png">
<title>CONTEXTO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--bg:#0a0f16;--card:#111820;--line:rgba(255,255,255,0.08);--ink:#e8eae6;--muted:rgba(232,234,230,0.58);--accent:#0f766e;--orange:#c96a3d;--shadow:0 2px 24px rgba(0,0,0,0.35)}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--ink);min-height:100svh}
button,input,textarea{font:inherit}

/* Onboarding */
.onboarding{position:fixed;inset:0;z-index:500;background:linear-gradient(160deg,#0c1a28 0%,#0a0f16 55%,#1a0e08 100%);display:none;flex-direction:column;align-items:center;justify-content:center;padding:36px 28px;text-align:center}
.onboarding.show{display:flex}
.ob-brand{font-size:11px;font-weight:900;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:36px}
.ob-title{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-size:34px;line-height:1.1;letter-spacing:-1px;color:#fff;margin-bottom:14px;max-width:320px}
.ob-sub{font-size:15px;line-height:1.75;color:rgba(255,255,255,0.65);max-width:300px;margin-bottom:48px}
.ob-btn{width:100%;max-width:320px;padding:18px;border-radius:18px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:800;cursor:pointer;margin-bottom:12px}
.ob-skip{font-size:14px;color:rgba(255,255,255,0.38);cursor:pointer;padding:8px;background:none;border:none}
.ob-form{width:100%;max-width:320px;text-align:left}
.ob-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:8px;display:block}
.ob-input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:15px;outline:none;margin-bottom:18px}
.ob-input::placeholder{color:rgba(255,255,255,0.28)}
.ob-input:focus{border-color:var(--accent)}
.ob-row{display:flex;gap:10px;margin-top:8px}

/* Header */
header{position:sticky;top:0;z-index:100;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,15,22,0.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand-wrap{display:flex;flex-direction:column;gap:1px}
.brand{font-size:13px;font-weight:900;letter-spacing:3.5px;text-transform:uppercase;color:var(--ink)}
.brand-by{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:12px}
.date-label{font-size:12px;color:var(--muted)}
.lang-btn{font-size:11px;font-weight:800;letter-spacing:1px;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}

/* Feed */
#feed{padding:16px 16px 120px;max-width:640px;margin:0 auto}

/* Take card */
.take{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px 20px;margin-bottom:14px;box-shadow:var(--shadow)}
.take-tag{display:inline-block;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;padding:4px 11px;border-radius:999px;margin-bottom:14px}
.take-tag.economia{background:rgba(212,168,71,0.14);color:#d4a847}
.take-tag.geopolitica{background:rgba(91,141,217,0.14);color:#5b8dd9}
.take-tag.tecnologia{background:rgba(15,157,138,0.14);color:#0f9d8a}
.take-tag.sociedad{background:rgba(155,127,212,0.14);color:#9b7fd4}
.take-tag.oportunidad{background:rgba(201,106,61,0.14);color:var(--orange)}
.take-tag.default{background:rgba(255,255,255,0.06);color:var(--muted)}
.take-headline{font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;font-size:22px;line-height:1.15;letter-spacing:-0.4px;margin-bottom:12px;color:var(--ink)}
.take-body{font-size:14px;line-height:1.75;color:var(--muted);margin-bottom:16px}
.take-why{padding:13px 15px;background:rgba(15,118,110,0.09);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;margin-bottom:16px}
.take-why-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.take-why-text{font-size:13px;line-height:1.65;color:var(--ink)}
.take-footer{display:flex;justify-content:flex-end}
.share-btn{background:none;border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px}
.share-btn:active{opacity:0.6}

/* Skeleton */
.skeleton{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px 20px;margin-bottom:14px}
.skel{height:12px;border-radius:6px;background:rgba(255,255,255,0.06);margin-bottom:10px;animation:pulse 1.6s ease infinite}
.skel.sm{width:35%}.skel.md{width:70%}.skel.lg{width:95%}.skel.h{height:20px;margin-bottom:14px}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}

/* Error */
.feed-error{text-align:center;padding:70px 24px}
.feed-error-icon{font-size:44px;margin-bottom:18px}
.feed-error-title{font-size:20px;font-weight:800;margin-bottom:8px}
.feed-error-sub{font-size:14px;color:var(--muted);line-height:1.65;margin-bottom:28px}
.retry-btn{padding:13px 28px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:14px;font-weight:800;cursor:pointer}

/* Chat FAB */
.chat-fab{position:fixed;bottom:28px;right:20px;z-index:200;border:none;border-radius:999px;background:var(--accent);color:#fff;font-size:13px;font-weight:800;letter-spacing:.5px;padding:14px 22px;cursor:pointer;box-shadow:0 6px 28px rgba(15,118,110,0.45)}
.chat-fab:active{opacity:0.85}

/* Chat overlay */
.chat-overlay{position:fixed;inset:0;z-index:300;background:var(--bg);display:none;flex-direction:column}
.chat-overlay.show{display:flex}
.chat-header{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.chat-title{font-size:15px;font-weight:800;letter-spacing:.5px}
.chat-close{background:none;border:1px solid var(--line);border-radius:999px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:88%;padding:12px 15px;border-radius:18px;font-size:14px;line-height:1.65}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-radius:18px 18px 4px 18px}
.chat-msg.ai{background:var(--card);border:1px solid var(--line);align-self:flex-start;border-radius:18px 18px 18px 4px}
.chat-input-row{padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;gap:10px;flex-shrink:0}
.chat-input{flex:1;padding:12px 14px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:14px;outline:none;resize:none;max-height:100px;line-height:1.5}
.chat-input:focus{border-color:var(--accent)}
.chat-send{padding:12px 18px;border-radius:14px;background:var(--accent);border:none;color:#fff;font-size:15px;font-weight:800;cursor:pointer;flex-shrink:0}
.chat-send:disabled{opacity:0.45}

/* Toast */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(25,35,50,0.96);border:1px solid var(--line);border-radius:14px;padding:11px 18px;font-size:13px;font-weight:600;white-space:nowrap;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Hidden canvas */
.hidden-canvas{position:fixed;left:-9999px;top:-9999px}
</style>
</head>
<body>

<!-- Onboarding -->
<div id="onboarding" class="onboarding">
  <div id="obStep1">
    <div class="ob-brand">CONTEXTO</div>
    <div class="ob-title">La realidad que los medios no te explican.</div>
    <div class="ob-sub">Lo que está pasando de verdad en el mundo — todos los días, en el idioma que sí entiendes.</div>
    <button class="ob-btn" onclick="obNext()">Empezar</button>
  </div>
  <div id="obStep2" style="display:none;width:100%;max-width:320px">
    <div class="ob-brand">CONTEXTO</div>
    <div class="ob-title" style="font-size:26px;margin-bottom:10px">Para darte el contexto más relevante</div>
    <div class="ob-sub" style="font-size:14px;margin-bottom:28px">Opcional — puedes saltártelo.</div>
    <div class="ob-form">
      <label class="ob-label">¿De dónde eres?</label>
      <input class="ob-input" id="obCity" type="text" placeholder="Ciudad, país...">
      <label class="ob-label">¿Cuántos años tienes?</label>
      <input class="ob-input" id="obAge" type="number" placeholder="Edad" min="13" max="99">
    </div>
    <div class="ob-row">
      <button class="ob-skip" onclick="finishOnboarding(false)">Saltar</button>
      <button class="ob-btn" style="flex:1;margin-bottom:0" onclick="finishOnboarding(true)">Continuar</button>
    </div>
  </div>
</div>

<!-- Header -->
<header>
  <div class="brand-wrap">
    <div class="brand">CONTEXTO</div>
    <div class="brand-by">por Stryv</div>
  </div>
  <div class="header-right">
    <span class="date-label" id="dateLabel"></span>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>
</header>

<!-- Feed -->
<main id="feed"></main>

<!-- Chat FAB -->
<button class="chat-fab" onclick="openChat()">✦ Tutor</button>

<!-- Chat overlay -->
<div class="chat-overlay" id="chatOverlay">
  <div class="chat-header">
    <div class="chat-title">CONTEXTO · Tutor</div>
    <button class="chat-close" onclick="closeChat()">Cerrar</button>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input-row">
    <textarea class="chat-input" id="chatInput" placeholder="Escribe tu pregunta..." rows="1"
      oninput="autoResize(this)" onkeydown="chatKey(event)"></textarea>
    <button class="chat-send" id="chatSend" onclick="sendChat()">→</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Share canvas -->
<canvas class="hidden-canvas" id="shareCanvas"></canvas>

<script>
// ── Store ────────────────────────────────────────────────────────────────────
var store = {
  get: function(k, d) { try { var v = localStorage.getItem('ctx_' + k); return v !== null ? JSON.parse(v) : d; } catch(e) { return d; } },
  set: function(k, v) { try { localStorage.setItem('ctx_' + k, JSON.stringify(v)); } catch(e) {} }
};

// ── State ────────────────────────────────────────────────────────────────────
var appLang       = store.get('appLang', 'es');
var userCtx       = store.get('userCtx', null);   // {city, age}
var takesCache    = store.get('takesCache', {});   // {date: [takes]}
var chatHistory   = store.get('chatHistory', []);
var onboardingDone = store.get('onboardingDone', false);
var currentTakes  = [];
var toastTimer    = null;

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(t) { var d = document.createElement('div'); d.textContent = t == null ? '' : String(t); return d.innerHTML; }
function todayKey() { return new Date().toISOString().slice(0, 10); }
function todayLabel() {
  var d = new Date();
  if (appLang === 'en') return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  var days = ['dom','lun','mar','mié','jue','vie','sáb'];
  var months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}
function todayFull() {
  var d = new Date();
  if (appLang === 'en') return d.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  var days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()] + ' ' + d.getDate() + ' de ' + months[d.getMonth()] + ' de ' + d.getFullYear();
}
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2800);
}

// ── Claude API ───────────────────────────────────────────────────────────────
function callClaude(prompt, maxTokens, mode) {
  return fetch('/.netlify/functions/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt: prompt, maxTokens: maxTokens || 1400, mode: mode || 'quality', lang: appLang })
  }).then(function(r) {
    return r.text().then(function(raw) {
      var status = r.status;
      var json;
      try { json = JSON.parse(raw); } catch(e) { throw new Error('HTTP ' + status + ' — respuesta no-JSON: ' + raw.slice(0, 80)); }
      if (!r.ok) throw new Error('HTTP ' + status + ': ' + (typeof json.error === 'string' ? json.error : JSON.stringify(json)).slice(0, 120));
      if (json.error) throw new Error('API error: ' + JSON.stringify(json.error).slice(0, 120));
      if (!json.content || !json.content[0]) throw new Error('Respuesta vacía del modelo');
      return json.content[0].text;
    });
  }).catch(function(err) {
    if (err.message && err.message.indexOf('fetch') !== -1) throw new Error('Sin conexión a internet');
    throw err;
  });
}

// ── News ─────────────────────────────────────────────────────────────────────
function fetchNews() {
  var timeout = new Promise(function(resolve) { setTimeout(function() { resolve([]); }, 5000); });
  var req = fetch('/.netlify/functions/news?lang=' + appLang)
    .then(function(r) { return r.json(); })
    .then(function(data) { return data.articles || []; })
    .catch(function() { return []; });
  return Promise.race([req, timeout]);
}

// ── Takes generation ─────────────────────────────────────────────────────────
function generateTakes(articles) {
  var newsText = articles.slice(0, 32).map(function(a) {
    return '- ' + a.title + (a.source ? ' [' + a.source + ']' : '');
  }).join('\n');

  var ctxNote = '';
  if (userCtx) {
    if (userCtx.city) ctxNote += 'El lector es de ' + userCtx.city + '. ';
    if (userCtx.age)  ctxNote += 'Tiene ' + userCtx.age + ' años. ';
    if (ctxNote) ctxNote = 'PERFIL: ' + ctxNote + '\n\n';
  }

  var isES = appLang !== 'en';
  var prompt = ctxNote + 'NOTICIAS (' + todayFull() + '):\n' + newsText + '\n\n' + (isES
    ? 'Genera 6 temas del día para CONTEXTO. Para cada tema:\n\n1. UNA oración directa con lo que pasó. Sin "según", sin "se informó", sin "dijeron". Solo el hecho.\n2. La capa real: por qué está pasando, quién se beneficia, cuál es la razón estructural detrás. 3 oraciones directas. Sé específico.\n3. La implicación concreta para alguien en América Latina. 1-2 oraciones. Impacto real en su dinero, trabajo u opciones de vida. Sin moralizar.\n\nCOBERTURA: incluye economía global, geopolítica, tecnología/IA, y al menos UN tema sobre oportunidades reales (países con mejores condiciones, inversión, movilidad, habilidades del futuro).\n\nTONO: amigo muy informado que habla sin rodeos. Nunca usa "expertos señalan", "analistas creen" ni lenguaje de noticiero. Directo, honesto, a veces provocador.\n\nRespuesta SOLO en JSON:\n[{"tag":"ECONOMÍA","headline":"titular directo de máx 12 palabras","body":"lo que pasó + la capa real","implication":"por qué te importa a ti"}]'
    : 'Generate 6 daily takes for CONTEXTO. For each take:\n\n1. ONE direct sentence with what happened. No "according to", no "sources say", no passive voice. Just the fact.\n2. The real layer: why it\'s happening, who benefits, the structural reason behind it. 3 direct sentences. Be specific.\n3. The concrete implication for someone in Latin America. 1-2 sentences. Real impact on their money, work, or life options. No moralizing.\n\nCOVERAGE: include global economy, geopolitics, tech/AI, and at least ONE topic about real opportunities (countries with better conditions, investment, mobility, future skills).\n\nTONE: very well-read friend who speaks plainly. Never use "experts say", "analysts believe" or news-anchor language. Direct, honest, sometimes provocative.\n\nRespond ONLY with JSON:\n[{"tag":"ECONOMY","headline":"direct headline max 12 words","body":"what happened + the real layer","implication":"why it matters to you"}]'
  );

  return callClaude(prompt, 1400, 'fast').then(function(text) {
    var m = text.match(/\[[\s\S]*\]/);
    if (!m) throw new Error('No JSON in response');
    return JSON.parse(m[0]);
  });
}

// ── Tag class ────────────────────────────────────────────────────────────────
function tagClass(tag) {
  var t = (tag || '').toLowerCase();
  if (/econom|financ|mercad|dinero|money|finance|deuda|dólar|dollar|invers/.test(t)) return 'economia';
  if (/geopolit|guerra|war|politic|poder|power|milita|diplom|sancion|nacho|otan|nato/.test(t)) return 'geopolitica';
  if (/tecnolog|tech|ia\b|ai\b|digital|chip|robot|automat|software|internet/.test(t)) return 'tecnologia';
  if (/oportunid|opportun|movil|mobility|visa|residen|migra|pais|country|calidad de vida/.test(t)) return 'oportunidad';
  if (/sociedad|society|cultura|culture|salud|health|educac|medio ambiente/.test(t)) return 'sociedad';
  return 'default';
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderTakes(takes) {
  var feed = document.getElementById('feed');
  if (!takes || !takes.length) { renderError('El modelo no devolvió contenido válido.'); return; }
  currentTakes = takes;
  var isEN = appLang === 'en';
  feed.innerHTML = takes.map(function(take, i) {
    var cls = tagClass(take.tag);
    return '<div class="take">' +
      '<div class="take-tag ' + cls + '">' + esc(take.tag) + '</div>' +
      '<div class="take-headline">' + esc(take.headline) + '</div>' +
      '<div class="take-body">' + esc(take.body) + '</div>' +
      '<div class="take-why">' +
        '<div class="take-why-label">' + (isEN ? 'Why it matters to you' : 'Por qué te importa') + '</div>' +
        '<div class="take-why-text">' + esc(take.implication) + '</div>' +
      '</div>' +
      '<div class="take-footer">' +
        '<button class="share-btn" onclick="shareTake(' + i + ')">↑ ' + (isEN ? 'Share' : 'Compartir') + '</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function renderLoading() {
  var html = '';
  for (var i = 0; i < 4; i++) {
    html += '<div class="skeleton">' +
      '<div class="skel sm"></div>' +
      '<div class="skel h"></div>' +
      '<div class="skel lg"></div>' +
      '<div class="skel md"></div>' +
      '<div class="skel lg"></div>' +
    '</div>';
  }
  document.getElementById('feed').innerHTML = html;
}

function renderError(detail) {
  document.getElementById('feed').innerHTML = '<div class="feed-error">' +
    '<div class="feed-error-icon">📡</div>' +
    '<div class="feed-error-title">Error de conexión</div>' +
    (detail ? '<div class="feed-error-sub" style="font-size:12px;word-break:break-all;margin-bottom:6px">' + esc(detail) + '</div>' : '') +
    '<div class="feed-error-sub">Verifica tu conexión e intenta de nuevo.</div>' +
    '<button class="retry-btn" onclick="loadFeed(true)" style="margin-top:20px">Intentar de nuevo</button>' +
  '</div>';
}

// ── Load feed ────────────────────────────────────────────────────────────────
function loadFeed(force) {
  var today = todayKey();
  if (!force && takesCache[today] && takesCache[today].length) {
    renderTakes(takesCache[today]);
    return;
  }
  renderLoading();
  fetchNews()
    .then(function(articles) {
      return generateTakes(articles);
    })
    .then(function(takes) {
      takesCache = {};
      takesCache[today] = takes;
      store.set('takesCache', takesCache);
      renderTakes(takes);
    })
    .catch(function(err) {
      console.error('Feed error:', err.message || err);
      var keys = Object.keys(takesCache);
      if (keys.length) {
        var last = keys.sort().pop();
        renderTakes(takesCache[last]);
        showToast('Sin conexión — mostrando contenido reciente.');
      } else {
        renderError(err.message || 'Error desconocido');
      }
    });
}

// ── Share ────────────────────────────────────────────────────────────────────
function shareTake(i) {
  var take = currentTakes[i];
  if (!take) return;
  var canvas = document.getElementById('shareCanvas');
  var ctx = canvas.getContext('2d');
  var W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  // Background
  ctx.fillStyle = '#0a0f16'; ctx.fillRect(0, 0, W, H);
  var g = ctx.createLinearGradient(0, 0, W, H);
  g.addColorStop(0, '#0c1a28'); g.addColorStop(1, '#150e08');
  ctx.fillStyle = g; ctx.fillRect(52, 52, W - 104, H - 104);

  // Brand
  ctx.fillStyle = '#0f766e'; ctx.font = '800 22px Helvetica';
  ctx.fillText('CONTEXTO', 96, 122);

  // Tag
  ctx.fillStyle = 'rgba(255,255,255,0.38)'; ctx.font = '700 18px Helvetica';
  ctx.fillText(take.tag || '', 96, 162);

  // Headline
  ctx.fillStyle = '#e8eae6'; ctx.font = '800 52px Helvetica';
  var words = take.headline.split(' '), line = '', lines = [], mw = W - 192;
  words.forEach(function(w) {
    var test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > mw && line) { lines.push(line); line = w; } else { line = test; }
  });
  lines.push(line);
  var y = 220;
  lines.slice(0, 4).forEach(function(l) { ctx.fillText(l, 96, y); y += 64; });

  // Body (first 2 sentences)
  var bodyShort = take.body.split(/[.!?]/g).filter(Boolean).slice(0, 2).join('. ') + '.';
  ctx.font = '400 27px Helvetica'; ctx.fillStyle = 'rgba(232,234,230,0.7)';
  var bWords = bodyShort.split(' '), bLine = '', bLines = [];
  bWords.forEach(function(w) {
    var test = bLine ? bLine + ' ' + w : w;
    if (ctx.measureText(test).width > mw && bLine) { bLines.push(bLine); bLine = w; } else { bLine = test; }
  });
  bLines.push(bLine);
  y += 28;
  bLines.slice(0, 6).forEach(function(l) { ctx.fillText(l, 96, y); y += 42; });

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(96, H - 160, W - 192, 1);
  ctx.fillStyle = 'rgba(232,234,230,0.45)'; ctx.font = '400 20px Helvetica';
  ctx.fillText('CONTEXTO · La realidad que los medios no te explican.', 96, H - 112);

  canvas.toBlob(function(blob) {
    if (!blob) { showToast(appLang === 'en' ? 'Could not create image.' : 'No se pudo crear la imagen.'); return; }
    var file = new File([blob], 'contexto.png', { type: 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: take.headline }).catch(function() {});
    } else {
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'contexto.png'; a.click();
    }
    showToast(appLang === 'en' ? 'Ready to share.' : 'Lista para compartir.');
  }, 'image/png');
}

// ── Chat ─────────────────────────────────────────────────────────────────────
function openChat() { document.getElementById('chatOverlay').classList.add('show'); }
function closeChat() { document.getElementById('chatOverlay').classList.remove('show'); }

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function chatKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } }

function renderChat() {
  var intro = appLang === 'en'
    ? "Ask me anything about today's topics — or anything happening in the world you want to understand."
    : 'Pregúntame lo que quieras sobre cualquiera de los temas de hoy — o sobre cualquier cosa del mundo que quieras entender.';
  var msgs = document.getElementById('chatMsgs');
  msgs.innerHTML = '<div class="chat-msg ai">' + esc(intro) + '</div>' +
    chatHistory.map(function(m) { return '<div class="chat-msg ' + m.role + '">' + esc(m.text) + '</div>'; }).join('');
  msgs.scrollTop = msgs.scrollHeight;
}

function sendChat() {
  var input = document.getElementById('chatInput');
  var q = input.value.trim(); if (!q) return;
  var btn = document.getElementById('chatSend');
  chatHistory.push({ role: 'user', text: q });
  chatHistory = chatHistory.slice(-24);
  store.set('chatHistory', chatHistory);
  input.value = ''; input.style.height = 'auto'; btn.disabled = true;
  renderChat();
  var msgs = document.getElementById('chatMsgs');
  msgs.innerHTML += '<div class="chat-msg ai" style="opacity:.5">...</div>';
  msgs.scrollTop = msgs.scrollHeight;

  var takesCtx = currentTakes.length
    ? (appLang === 'en' ? 'TODAY\'S TOPICS:\n' : 'TEMAS DE HOY:\n') +
      currentTakes.map(function(t) { return t.tag + ': ' + t.headline + ' — ' + t.body; }).join('\n') + '\n\n'
    : '';
  var conversation = chatHistory.slice(-12).map(function(m) {
    return (m.role === 'user' ? (appLang === 'en' ? 'User: ' : 'Usuario: ') : 'Tutor: ') + m.text;
  }).join('\n');
  var prompt = takesCtx + (appLang === 'en'
    ? 'CONVERSATION:\n' + conversation + '\n\nRespond as a direct, honest tutor. No hedging, no "experts say". Give real structural context. Max 5 sentences.'
    : 'CONVERSACIÓN:\n' + conversation + '\n\nResponde como tutor directo y honesto. Sin "expertos señalan", sin rodeos. Da contexto estructural real. Máximo 5 oraciones.');

  callClaude(prompt, 700, 'quality')
    .then(function(text) {
      chatHistory.push({ role: 'ai', text: text });
      chatHistory = chatHistory.slice(-24);
      store.set('chatHistory', chatHistory);
      renderChat();
    })
    .catch(function() {
      chatHistory.push({ role: 'ai', text: appLang === 'en' ? 'Connection error. Try again.' : 'Error de conexión. Intenta de nuevo.' });
      renderChat();
    })
    .finally(function() { btn.disabled = false; });
}

// ── Language ─────────────────────────────────────────────────────────────────
function toggleLang() {
  appLang = appLang === 'es' ? 'en' : 'es';
  store.set('appLang', appLang);
  document.getElementById('langBtn').textContent = appLang === 'es' ? 'EN' : 'ES';
  document.getElementById('dateLabel').textContent = todayLabel();
  renderChat();
  loadFeed(true);
}

// ── Onboarding ───────────────────────────────────────────────────────────────
function obNext() {
  document.getElementById('obStep1').style.display = 'none';
  document.getElementById('obStep2').style.display = 'block';
}

function finishOnboarding(saveCtx) {
  if (saveCtx) {
    var city = document.getElementById('obCity').value.trim();
    var age  = parseInt(document.getElementById('obAge').value) || null;
    if (city || age) { userCtx = { city: city || null, age: age }; store.set('userCtx', userCtx); }
  }
  onboardingDone = true;
  store.set('onboardingDone', true);
  document.getElementById('onboarding').classList.remove('show');
  loadFeed();
}

// ── Init ─────────────────────────────────────────────────────────────────────
function init() {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js').catch(function() {});
  document.getElementById('dateLabel').textContent = todayLabel();
  document.getElementById('langBtn').textContent = appLang === 'es' ? 'EN' : 'ES';
  renderChat();
  if (!onboardingDone) {
    document.getElementById('onboarding').classList.add('show');
  } else {
    loadFeed();
  }
}

init();
</script>
