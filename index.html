<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;max-width:600px;margin:0 auto;min-height:100dvh;transition:background .3s,color .3s}

/* ═══ THEME: DARK (default) ═══ */
:root,[data-theme="dark"]{
  --bg:#0D1117;--surface:#161b22;--surface-2:#1c2128;--surface-3:#272d35;
  --border:#30363d;--border-light:#21262d;
  --text:#EAF0EE;--text-2:#8b949e;--text-3:#6e7681;
  --accent:#4ECDC4;--accent-soft:rgba(78,205,196,.12);--accent-mid:rgba(78,205,196,.25);
  --danger:#f85149;--danger-soft:rgba(248,81,73,.12);
  --warning:#d29922;--warning-soft:rgba(210,153,34,.12);
  --blue:#58a6ff;--blue-soft:rgba(88,166,255,.12);
  --cta-bg:#4ECDC4;--cta-text:#0D1117;
  --blur-bg:rgba(13,17,23,.92);
  --skeleton-a:#161b22;--skeleton-b:#1c2128;
  --live-dot:#f85149;
  --card-hover:#1c2128;
}

/* ═══ THEME: LIGHT ═══ */
[data-theme="light"]{
  --bg:#EAF0EE;--surface:#ffffff;--surface-2:#f2f5f4;--surface-3:#e8edeb;
  --border:#d4dbd8;--border-light:#e8edeb;
  --text:#0D1117;--text-2:#3d4a53;--text-3:#6b7c87;
  --accent:#3aafa9;--accent-soft:rgba(58,175,169,.1);--accent-mid:rgba(58,175,169,.2);
  --danger:#d1242f;--danger-soft:rgba(209,36,47,.08);
  --warning:#bf8700;--warning-soft:rgba(191,135,0,.08);
  --blue:#0969da;--blue-soft:rgba(9,105,218,.08);
  --cta-bg:#0D1117;--cta-text:#EAF0EE;
  --blur-bg:rgba(234,240,238,.92);
  --skeleton-a:#e8edeb;--skeleton-b:#d4dbd8;
  --live-dot:#d1242f;
  --card-hover:#f2f5f4;
}

body{background:var(--bg);color:var(--text);padding-bottom:76px;border-left:1px solid var(--border-light);border-right:1px solid var(--border-light)}

/* ═══ LOADER ═══ */
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,visibility .5s}
.loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.loader-brand{font-family:'League Spartan',sans-serif;font-size:32px;font-weight:900;color:var(--text);letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.loader-sub{font-size:12px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;margin-bottom:32px}
.loader-pulse{width:40px;height:40px;border-radius:50%;background:var(--accent);animation:loaderPulse 1.2s infinite}
@keyframes loaderPulse{0%,100%{transform:scale(.8);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.loader-status{margin-top:20px;font-size:12px;color:var(--text-3);letter-spacing:.3px}

/* ═══ TOP BAR ═══ */
.top-bar{position:sticky;top:0;z-index:100;background:var(--blur-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light);padding:0 16px;display:flex;align-items:center;height:52px;gap:10px}
.top-bar-brand{font-family:'League Spartan',sans-serif;font-size:18px;font-weight:900;color:var(--text);letter-spacing:2px;text-transform:uppercase;flex:1}
.top-bar-live{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--live-dot);letter-spacing:.5px;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live-dot);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.top-btn{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:15px;color:var(--text-2);transition:all .15s}
.top-btn:hover{background:var(--surface-2);color:var(--text)}

/* ═══ DATE HEADER ═══ */
.date-header{padding:16px 16px 12px;border-bottom:1px solid var(--border-light)}
.date-main{font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.date-tagline{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1.2}

/* ═══ SECTION NAV ═══ */
.sec-nav{display:flex;overflow-x:auto;border-bottom:1px solid var(--border-light);scrollbar-width:none;padding:0 12px;gap:2px}
.sec-nav::-webkit-scrollbar{display:none}
.sec-tab{flex-shrink:0;padding:12px 14px;font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.sec-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.sec-tab:hover{color:var(--text)}
.sec-tab-count{font-size:10px;background:var(--surface-2);color:var(--text-3);padding:1px 6px;border-radius:10px;font-weight:700}

/* ═══ FEED ═══ */
.feed{display:none}
.feed.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.feed-header{padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.feed-section-title{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px}
.feed-count{font-size:11px;color:var(--text-3)}

/* ═══ NEWS CARD ═══ */
.news-card{border-bottom:1px solid var(--border-light);padding:14px 16px;cursor:pointer;transition:background .12s;position:relative}
.news-card:hover{background:var(--card-hover)}
.news-card-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.news-card-source{font-size:11px;font-weight:600;color:var(--text-3)}
.news-card-dot{width:2px;height:2px;border-radius:50%;background:var(--text-3);flex-shrink:0}
.news-card-time{font-size:11px;color:var(--text-3)}
.news-card-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;letter-spacing:-.2px;margin-bottom:6px}
.news-card-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;text-transform:uppercase;letter-spacing:.3px}
.tag-dinero{color:var(--accent);background:var(--accent-soft)}
.tag-poder{color:var(--danger);background:var(--danger-soft)}
.tag-tecnologia{color:var(--blue);background:var(--blue-soft)}
.tag-mercados{color:var(--warning);background:var(--warning-soft)}
.tag-movilidad{color:var(--accent);background:var(--accent-soft)}
.tag-latam{color:var(--blue);background:var(--blue-soft)}
.news-card-arrow{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;opacity:0;transition:opacity .15s}
.news-card:hover .news-card-arrow{opacity:1}

/* ═══ ANALYSIS PANEL ═══ */
.analysis{display:none;border-bottom:1px solid var(--border);background:var(--surface);overflow:hidden}
.analysis.open{display:block;animation:slideOpen .25s ease}
@keyframes slideOpen{from{opacity:0;max-height:0}to{opacity:1;max-height:3000px}}

.analysis-bar{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border-light)}
.analysis-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--accent)}
.analysis-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite}
.analysis-close{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;padding:4px}

.analysis-body{padding:16px}
.analysis-headline{font-size:14px;font-weight:800;color:var(--accent);line-height:1.35;margin-bottom:14px;padding-left:12px;border-left:3px solid var(--accent)}

.analysis-section{margin-bottom:18px}
.analysis-section:last-child{margin-bottom:0}
.analysis-label{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.analysis-text{font-size:15px;line-height:1.7;color:var(--text)}
.analysis-text strong{font-weight:700}

.analysis-impact{font-size:14px;line-height:1.6;color:var(--text);padding:12px 14px;background:var(--danger-soft);border-radius:10px;border-left:3px solid var(--danger)}
.analysis-shift{font-size:14px;line-height:1.6;color:var(--text);padding:12px 14px;background:var(--accent-soft);border-radius:10px;border-left:3px solid var(--accent)}

.analysis-actions{display:flex;flex-direction:column;gap:8px}
.analysis-action{display:flex;gap:10px;padding:10px 12px;background:var(--surface-2);border:1px solid var(--border-light);border-radius:8px}
.analysis-action-num{font-size:12px;font-weight:800;color:var(--accent);min-width:18px;margin-top:1px}
.analysis-action-text{font-size:13px;color:var(--text);line-height:1.45}

.analysis-share{display:flex;justify-content:center;padding-top:14px;border-top:1px solid var(--border-light);margin-top:16px}
.analysis-share-btn{font-size:12px;font-weight:600;color:var(--text-3);background:none;border:1px solid var(--border);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;transition:all .15s}
.analysis-share-btn:hover{color:var(--text);border-color:var(--text-3)}

/* ═══ SKELETON ═══ */
.sk{background:linear-gradient(90deg,var(--skeleton-a) 25%,var(--skeleton-b) 50%,var(--skeleton-a) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;margin-bottom:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ═══ EMPTY STATE ═══ */
.empty-state{padding:60px 24px;text-align:center}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-desc{font-size:13px;color:var(--text-3);line-height:1.5}

/* ═══ STRYV CTA ═══ */
.stryv-cta{margin:16px;padding:20px;background:var(--cta-bg);border-radius:16px;color:var(--cta-text);position:relative;overflow:hidden}
.stryv-cta::before{content:'';position:absolute;top:-40%;right:-15%;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.stryv-cta-eyebrow{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.5;margin-bottom:6px;position:relative}
.stryv-cta-title{font-size:17px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px;line-height:1.25;position:relative}
.stryv-cta-desc{font-size:13px;opacity:.65;line-height:1.55;margin-bottom:14px;position:relative}
.stryv-cta-btn{display:block;background:var(--bg);color:var(--text);font-size:14px;font-weight:700;padding:12px;border-radius:10px;text-align:center;text-decoration:none;transition:opacity .15s;position:relative}
.stryv-cta-btn:active{opacity:.85}
.stryv-cta-link{display:block;text-align:center;font-size:11px;opacity:.35;text-decoration:none;margin-top:8px;position:relative;color:inherit}

/* ═══ REFRESH BAR ═══ */
.refresh-bar{padding:10px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.refresh-time{font-size:11px;color:var(--text-3)}
.refresh-btn{font-size:12px;font-weight:600;color:var(--accent);background:none;border:1px solid var(--accent);padding:4px 14px;border-radius:16px;cursor:pointer;font-family:inherit;transition:all .15s}
.refresh-btn:hover{background:var(--accent-soft)}
.refresh-btn:disabled{opacity:.4;cursor:default}

/* ═══ BOTTOM NAV ═══ */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:var(--blur-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border-light);padding:6px 0 max(env(safe-area-inset-bottom),12px);display:flex;justify-content:space-around;z-index:200}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--text-3);cursor:pointer;min-width:48px;padding:4px 8px;text-decoration:none;transition:color .15s;-webkit-tap-highlight-color:transparent;user-select:none}
.nav-item.active{color:var(--accent)}
.nav-item:hover{color:var(--text)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.1px}

/* ═══ SEARCH ═══ */
.search-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.search-overlay.open{display:flex}
.search-bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border)}
.search-input{flex:1;font-size:16px;font-family:inherit;border:none;background:none;color:var(--text);outline:none;padding:10px 0}
.search-input::placeholder{color:var(--text-3)}
.search-cancel{font-size:14px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:600}
.search-results{flex:1;overflow-y:auto;padding:8px 0}
.search-empty{padding:40px 24px;text-align:center;color:var(--text-3);font-size:14px}
.search-result{padding:14px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s}
.search-result:hover{background:var(--surface-2)}
.search-result-section{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.search-result-title{font-size:15px;font-weight:700;color:var(--text)}

@media(min-width:600px){body{box-shadow:0 0 0 1px var(--border-light)}}
</style>
</head>
<body>

    <span class="nav-icon">⚡</span><span class="nav-label">Poder</span>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════ */
/*  CONSTANTS                             */
/* ═══════════════════════════════════════ */
const SECTIONS = ['all','Dinero','Poder','Tecnología','Mercados','Movilidad','Latam'];
const SECTION_ICONS = {all:'📡',Dinero:'💰',Poder:'⚡','Tecnología':'🤖',Mercados:'📊',Movilidad:'🌍',Latam:'🌎'};
const SECTION_TAGS = {Dinero:'tag-dinero',Poder:'tag-poder','Tecnología':'tag-tecnologia',Mercados:'tag-mercados',Movilidad:'tag-movilidad',Latam:'tag-latam'};

const CTAS = {
  Dinero: { title:'¿Tu negocio no tiene sistema financiero digital?', desc:'Construimos la infraestructura que hace que tu negocio opere aunque tú no estés.' },
  Poder: { title:'El mundo cambia. ¿Tu negocio también?', desc:'Sistemas digitales para negocios que entienden que el mundo ya no es el mismo.' },
  'Tecnología': { title:'¿Tu negocio ya usa IA?', desc:'Implementamos atención automatizada con IA para negocios que no quieren quedarse atrás.' },
  Mercados: { title:'¿Operas sin datos en tiempo real?', desc:'Dashboards, automatización y sistemas que te dan visibilidad total de tu negocio.' },
  Movilidad: { title:'¿Tu negocio puede operar desde cualquier país?', desc:'Si no, hay algo que no está digitalizado. Hablemos.' },
  Latam: { title:'¿Listo para escalar fuera de tu ciudad?', desc:'Todo lo que aprendiste aquí, Stryv lo implementa. Diagnóstico gratis.' }
};

/* ═══════════════════════════════════════ */
/*  STATE                                 */
/* ═══════════════════════════════════════ */
const LS = 'ctx_';
const store = {
  get(k,fb){try{const v=localStorage.getItem(LS+k);return v!==null?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem(LS+k,JSON.stringify(v))}catch{}}
};

let articles = [];
let newsSummary = '';
let activeSection = 'all';
let analysisCache = store.get('analysisCache', {});
let theme = store.get('theme', 'dark');

/* ═══════════════════════════════════════ */
/*  HELPERS                               */
/* ═══════════════════════════════════════ */
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function timeAgo(dateStr){
  if(!dateStr) return '';
  try{
    const d=new Date(dateStr);
    const now=new Date();
    const mins=Math.floor((now-d)/60000);
    if(mins<1) return 'ahora';
    if(mins<60) return mins+'m';
    const hrs=Math.floor(mins/60);
    if(hrs<24) return hrs+'h';
    return Math.floor(hrs/24)+'d';
  }catch{return ''}
}

function todayFormatted(){
  const d=new Date();
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return days[d.getDay()]+' '+d.getDate()+' de '+months[d.getMonth()]+', '+d.getFullYear();
}

/* ═══════════════════════════════════════ */
/*  THEME                                 */
/* ═══════════════════════════════════════ */
function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme);
  const btn=$('#themeBtn');
  if(btn) btn.textContent = theme==='dark'?'☀️':'🌙';
}

function toggleTheme(){
  theme = theme==='dark'?'light':'dark';
  store.set('theme', theme);
  applyTheme();
}

/* ═══════════════════════════════════════ */
/*  FETCH NEWS                            */
/* ═══════════════════════════════════════ */
async function fetchNews(){
  try{
    const res = await fetch('/.netlify/functions/news');
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    articles = data.articles || [];
    newsSummary = data.summary || '';
    return data;
  }catch(e){
    return {articles:[],sections:{},summary:'',count:0};
  }
}

/* ═══════════════════════════════════════ */
/*  CALL CLAUDE                           */
/* ═══════════════════════════════════════ */
async function callClaude(prompt, maxTokens){
  const res = await fetch('/.netlify/functions/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({prompt, maxTokens: maxTokens||1200})
  });
  if(!res.ok) throw new Error('API error');
  const json = await res.json();
  if(json.error) throw new Error(json.error.message||'API error');
  return json.content[0].text;
}

/* ═══════════════════════════════════════ */
/*  RENDER SECTION NAV                    */
/* ═══════════════════════════════════════ */
function renderSecNav(){
  const nav=$('#secNav');
  nav.innerHTML = SECTIONS.map(s=>{
    const active = s===activeSection?' active':'';
    const icon = SECTION_ICONS[s]||'';
    const label = s==='all'?'Todo':s;
    const count = s==='all'?articles.length:articles.filter(a=>a.section===s).length;
    if(s!=='all' && count===0) return '';
    return '<div class="sec-tab'+active+'" data-section="'+s+'">'+
      icon+' '+label+
      '<span class="sec-tab-count">'+count+'</span></div>';
  }).join('');
}

/* ═══════════════════════════════════════ */
/*  RENDER FEEDS                          */
/* ═══════════════════════════════════════ */
function renderFeeds(){
  const container=$('#feedContainer');
  const filtered = activeSection==='all'?articles:articles.filter(a=>a.section===activeSection);

  if(filtered.length===0){
    container.innerHTML='<div class="empty-state"><div class="empty-icon">📡</div><div class="empty-title">Sin noticias aún</div><div class="empty-desc">Estamos buscando las noticias más relevantes. Intenta actualizar.</div></div>';
    return;
  }

  // Group by section if "all"
  let html='';

  if(activeSection==='all'){
    const grouped={};
    filtered.forEach(a=>{
      if(!grouped[a.section]) grouped[a.section]=[];
      grouped[a.section].push(a);
    });

    for(const sec of Object.keys(grouped)){
      const arts = grouped[sec];
      html+='<div class="feed-header"><div class="feed-section-title">'+(SECTION_ICONS[sec]||'')+' '+esc(sec)+'</div><div class="feed-count">'+arts.length+' noticias</div></div>';
      html+=renderCards(arts);
      // CTA after every 2nd section
      const secKeys = Object.keys(grouped);
      const secIdx = secKeys.indexOf(sec);
      if(secIdx===1 || secIdx===3){
        const ctaKey = sec;
        const cta = CTAS[ctaKey] || CTAS.Dinero;
        html+=renderCTA(cta);
      }
    }
  } else {
    html+='<div class="feed-header"><div class="feed-section-title">'+(SECTION_ICONS[activeSection]||'')+' '+esc(activeSection)+'</div><div class="feed-count">'+filtered.length+' noticias</div></div>';
    html+=renderCards(filtered);
    const cta = CTAS[activeSection] || CTAS.Dinero;
    html+=renderCTA(cta);
  }

  container.innerHTML=html;
}

function renderCards(arts){
  return arts.map((a,i)=>{
    const id = hashId(a.title);
    const tagClass = SECTION_TAGS[a.section]||'tag-dinero';
    return '<div class="news-card" data-id="'+id+'">'+
      '<div class="news-card-top">'+
        '<span class="news-card-source">'+esc(a.source||a.section)+'</span>'+
        '<span class="news-card-dot"></span>'+
        '<span class="news-card-time">'+timeAgo(a.date)+'</span>'+
      '</div>'+
      '<div class="news-card-title">'+esc(a.title)+'</div>'+
      '<span class="news-card-tag '+tagClass+'">'+esc(a.section)+'</span>'+
      '<span class="news-card-arrow">›</span>'+
    '</div>'+
    '<div class="analysis" id="analysis-'+id+'">'+
      '<div class="analysis-bar">'+
        '<span class="analysis-badge"><span class="analysis-badge-dot"></span>Análisis IA en tiempo real</span>'+
        '<button class="analysis-close" data-close-analysis="'+id+'">✕</button>'+
      '</div>'+
      '<div class="analysis-body" id="abody-'+id+'">'+
        '<div class="sk" style="height:14px;width:100%"></div>'+
        '<div class="sk" style="height:14px;width:85%"></div>'+
        '<div class="sk" style="height:14px;width:70%"></div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function renderCTA(cta){
  return '<div class="stryv-cta">'+
    '<div class="stryv-cta-eyebrow">Stryv Studio</div>'+
    '<div class="stryv-cta-title">'+esc(cta.title)+'</div>'+
    '<div class="stryv-cta-desc">'+esc(cta.desc)+'</div>'+
    '<a href="https://wa.me/17373683464" target="_blank" rel="noopener" class="stryv-cta-btn">Hablar con Stryv</a>'+
    '<a href="https://stryvstudio.com" target="_blank" rel="noopener" class="stryv-cta-link">stryvstudio.com</a>'+
  '</div>';
}

function hashId(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0}
  return 'n'+Math.abs(h);
}

/* ═══════════════════════════════════════ */
/*  ANALYZE ARTICLE                       */
/* ═══════════════════════════════════════ */
function toggleAnalysis(id){
  const panel=$('#analysis-'+id);
  if(!panel) return;

  const isOpen = panel.classList.contains('open');

  // Close all open
  $$('.analysis').forEach(a=>a.classList.remove('open'));
  $$('.news-card').forEach(c=>c.style.borderLeftColor='transparent');

  if(!isOpen){
    panel.classList.add('open');

    // Find article
    const article = articles.find(a=>hashId(a.title)===id);
    if(!article) return;

    if(analysisCache[id]){
      renderAnalysis(id, analysisCache[id], article);
    } else {
      generateAnalysis(id, article);
    }

    setTimeout(()=>panel.scrollIntoView({behavior:'smooth',block:'nearest'}),120);
  }
}

async function generateAnalysis(id, article){
  const body=$('#abody-'+id);
  if(!body) return;

  body.innerHTML='<div class="sk" style="height:14px;width:100%"></div><div class="sk" style="height:14px;width:85%"></div><div class="sk" style="height:14px;width:70%"></div><div class="sk" style="height:14px;width:90%"></div>';

  const dateStr = todayFormatted();

  try{
    const text = await callClaude(
      'Fecha: '+dateStr+'. Eres un analista de inteligencia global para la plataforma CONTEXTO de Stryv Studio. Tu trabajo es analizar noticias y explicar por qué le importan a un latinoamericano.\n\n'+
      'NOTICIAS REALES DE HOY:\n'+newsSummary+'\n\n'+
      'NOTICIA A ANALIZAR: "'+article.title+'" — Fuente: '+article.source+' — Sección: '+article.section+'\n\n'+
      'Genera un análisis profundo de esta noticia. Responde SOLO con JSON válido sin markdown:\n'+
      '{"titular_contexto":"Reescribe el titular en 1 línea revelando lo que realmente significa — el ángulo que los medios no explican",'+ 
      '"que_esta_pasando":"2-3 párrafos explicando qué está pasando realmente, con contexto histórico y geopolítico. Conecta con otras noticias de hoy si es relevante. Sin relleno.",'+ 
      '"por_que_te_afecta":"1 párrafo directo: cómo esto impacta la vida, el bolsillo o las opciones de alguien en Latinoamérica",'+ 
      '"cambio_de_paradigma":"1 párrafo: qué creencia o asunción del status quo esta noticia desafía — qué deberías repensar",'+ 
      '"que_hacer":[{"num":"1","texto":"Acción concreta inmediata"},{"num":"2","texto":"Acción a mediano plazo"}]}',
      1500
    );

    const data = JSON.parse(text.replace(/```json|```/g,'').trim());
    analysisCache[id] = data;
    store.set('analysisCache', analysisCache);
    renderAnalysis(id, data, article);
  }catch(e){
    body.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-3);font-size:13px">'+
      '⚠️ No se pudo generar el análisis.<br>'+
      '<button onclick="retryAnalysis(\''+id+'\')" style="margin-top:8px;padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Reintentar</button></div>';
  }
}

window.retryAnalysis = function(id){
  delete analysisCache[id];
  store.set('analysisCache', analysisCache);
  const article = articles.find(a=>hashId(a.title)===id);
  if(article) generateAnalysis(id, article);
};

function renderAnalysis(id, data, article){
  const body=$('#abody-'+id);
  if(!body||!data) return;

  let html='';

  if(data.titular_contexto){
    html+='<div class="analysis-headline">'+esc(data.titular_contexto)+'</div>';
  }

  html+='<div class="analysis-section"><div class="analysis-label">Qué está pasando realmente</div>'+
    '<div class="analysis-text">'+esc(data.que_esta_pasando||'').replace(/\n/g,'<br><br>')+'</div></div>';

  if(data.por_que_te_afecta){
    html+='<div class="analysis-section"><div class="analysis-label">Por qué te afecta</div>'+
      '<div class="analysis-impact">'+esc(data.por_que_te_afecta)+'</div></div>';
  }

  if(data.cambio_de_paradigma){
    html+='<div class="analysis-section"><div class="analysis-label">Cambio de paradigma</div>'+
      '<div class="analysis-shift">'+esc(data.cambio_de_paradigma)+'</div></div>';
  }

  if(data.que_hacer && data.que_hacer.length){
    html+='<div class="analysis-section"><div class="analysis-label">Qué hacer</div><div class="analysis-actions">';
    data.que_hacer.forEach(a=>{
      html+='<div class="analysis-action"><div class="analysis-action-num">'+esc(a.num)+'</div><div class="analysis-action-text">'+esc(a.texto)+'</div></div>';
    });
    html+='</div></div>';
  }

  html+='<div class="analysis-share"><button class="analysis-share-btn" data-share="'+id+'">Compartir análisis ↗</button></div>';

  body.innerHTML=html;
}

/* ═══════════════════════════════════════ */
/*  SEARCH                                */
/* ═══════════════════════════════════════ */
function openSearch(){$('#searchOverlay').classList.add('open');setTimeout(()=>$('#searchInput').focus(),100)}
function closeSearch(){$('#searchOverlay').classList.remove('open');$('#searchInput').value='';renderSearchResults('')}

function renderSearchResults(q){
  const c=$('#searchResults');
  if(!q.trim()){c.innerHTML='<div class="search-empty">Escribe para buscar en todas las noticias</div>';return}
  const lower=q.toLowerCase();
  const results=articles.filter(a=>a.title.toLowerCase().includes(lower));
  if(!results.length){c.innerHTML='<div class="search-empty">Sin resultados para "'+esc(q)+'"</div>';return}
  c.innerHTML=results.map(a=>
    '<div class="search-result" data-search-id="'+hashId(a.title)+'" data-search-section="'+a.section+'">'+
      '<div class="search-result-section">'+(SECTION_ICONS[a.section]||'')+' '+esc(a.section)+'</div>'+
      '<div class="search-result-title">'+esc(a.title)+'</div></div>'
  ).join('');
}

/* ═══════════════════════════════════════ */
/*  SWITCH SECTION                        */
/* ═══════════════════════════════════════ */
function switchSection(sec){
  activeSection=sec;
  renderSecNav();
  renderFeeds();
  $$('.nav-item').forEach(n=>n.classList.remove('active'));
  const navMatch = document.querySelector('.nav-item[data-nav="'+sec+'"]');
  if(navMatch) navMatch.classList.add('active');
  else $$('.nav-item')[0]?.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ═══════════════════════════════════════ */
/*  SHARE                                 */
/* ═══════════════════════════════════════ */
function shareAnalysis(id){
  const article = articles.find(a=>hashId(a.title)===id);
  const data = analysisCache[id];
  if(!article) return;
  const text = article.title+'\n\n'+(data?.titular_contexto||'')+'\n\n'+(data?.por_que_te_afecta||'')+'\n\n— CONTEXTO por Stryv Studio';

  if(navigator.share){
    navigator.share({title:article.title,text,url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.querySelector('[data-share="'+id+'"]');
      if(btn){btn.textContent='✓ Copiado';setTimeout(()=>btn.textContent='Compartir análisis ↗',1500)}
    }).catch(()=>{});
  }
}

/* ═══════════════════════════════════════ */
/*  EVENTS                                */
/* ═══════════════════════════════════════ */
document.addEventListener('click',e=>{
  const tab=e.target.closest('[data-section]');
  if(tab){switchSection(tab.dataset.section);return}

  const nav=e.target.closest('[data-nav]');
  if(nav){switchSection(nav.dataset.nav);return}

  const card=e.target.closest('.news-card');
  if(card){toggleAnalysis(card.dataset.id);return}

  const closeA=e.target.closest('[data-close-analysis]');
  if(closeA){const panel=$('#analysis-'+closeA.dataset.closeAnalysis);if(panel)panel.classList.remove('open');return}

  const shareBtn=e.target.closest('[data-share]');
  if(shareBtn){shareAnalysis(shareBtn.dataset.share);return}

  if(e.target.closest('#searchBtn')){openSearch();return}
  if(e.target.closest('#searchClose')){closeSearch();return}
  if(e.target.closest('#themeBtn')){toggleTheme();return}

  const searchR=e.target.closest('.search-result');
  if(searchR){
    closeSearch();
    switchSection(searchR.dataset.searchSection);
    setTimeout(()=>toggleAnalysis(searchR.dataset.searchId),300);
    return;
  }

  if(e.target.closest('#refreshBtn')){refreshAll();return}
});

document.addEventListener('input',e=>{if(e.target.id==='searchInput')renderSearchResults(e.target.value)});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch()});

/* ═══════════════════════════════════════ */
/*  REFRESH                               */
/* ═══════════════════════════════════════ */
async function refreshAll(){
  const btn=$('#refreshBtn');
  btn.disabled=true;
  btn.textContent='Actualizando...';
  $('#refreshTime').textContent='Buscando noticias...';

  // Clear analysis cache on refresh
  analysisCache={};
  store.set('analysisCache',{});

  await fetchNews();
  renderSecNav();
  renderFeeds();
  updateRefreshTime();

  btn.disabled=false;
  btn.textContent='Actualizar';
}

function updateRefreshTime(){
  const now=new Date();
  const h=now.getHours().toString().padStart(2,'0');
  const m=now.getMinutes().toString().padStart(2,'0');
  $('#refreshTime').textContent='Actualizado a las '+h+':'+m;
}

/* ═══════════════════════════════════════ */
/*  SWIPE                                 */
/* ═══════════════════════════════════════ */
let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
  const diff=touchX-e.changedTouches[0].screenX;
  if(Math.abs(diff)<80) return;
  const presentSections = SECTIONS.filter(s=>s==='all'||articles.some(a=>a.section===s));
  const idx=presentSections.indexOf(activeSection);
  if(diff>0 && idx<presentSections.length-1) switchSection(presentSections[idx+1]);
  else if(diff<0 && idx>0) switchSection(presentSections[idx-1]);
},{passive:true});

/* ═══════════════════════════════════════ */
/*  LOADER & INIT                         */
/* ═══════════════════════════════════════ */
async function init(){
  applyTheme();
  $('#dateMain').textContent = todayFormatted();

  // Show loader statuses
  const statusEl=$('#loaderStatus');
  const statuses=['Conectando fuentes...','Escaneando Google News...','Analizando titulares...','Preparando tu briefing...'];
  let sIdx=0;

  const statusInterval=setInterval(()=>{
    sIdx++;
    if(sIdx<statuses.length) statusEl.textContent=statuses[sIdx];
  },800);

  await fetchNews();
  clearInterval(statusInterval);
  statusEl.textContent=articles.length+' noticias encontradas';

  renderSecNav();
  renderFeeds();
  updateRefreshTime();
  $('#refreshBtn').disabled=false;

  setTimeout(()=>$('#loader').classList.add('hidden'),600);

  // Auto-refresh every 15 min
  setInterval(async()=>{
    await fetchNews();
    renderSecNav();
    renderFeeds();
    updateRefreshTime();
  }, 900000);
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
</body>
</html>
